apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "copy-fail-blocker.fullname" . }}
  labels:
    {{- include "copy-fail-blocker.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "copy-fail-blocker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "copy-fail-blocker.selectorLabels" . | nindent 8 }}
    spec:
      hostPID: false
      hostNetwork: false
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: blocker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
            runAsUser: 0
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: bpffs
              mountPath: /sys/fs/bpf
              mountPropagation: HostToContainer
      volumes:
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: Directory
